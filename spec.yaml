name: jivo-factory
description: "JIVO factory management CLI (ji.jivo.in / factory.jivo.in) — read-only access to the Jivamart (JIVO_MART) factory: gate, vehicles, quality control, GRPO, barcode traceability, dispatch, production, WMS, maintenance & dashboards"
version: "0.1.0"
base_url: "https://factory.jivo.in/api/v1"
health_check_path: "/accounts/me/"
category: developer-tools

required_headers:
  - name: Company-Code
    value: "JIVO_MART"

auth:
  type: bearer_token
  header: "Authorization"
  format: "Bearer {token}"
  env_vars:
    - JIVO_FACTORY_TOKEN

config:
  format: toml
  path: "~/.config/jivo-factory-pp-cli/config.toml"

resources:
  accounts:
    description: "Accounts & users"
    endpoints:
      me:
        method: GET
        path: "/accounts/me/"
        description: "GET /accounts/me/ — accounts me"
        response:
          type: object
      users:
        method: GET
        path: "/accounts/users/"
        description: "GET /accounts/users/ — accounts users"
        response:
          type: object
